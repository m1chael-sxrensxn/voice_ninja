<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebRTC Voice Chat</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:30px;
}

canvas{
    background:#111;
    border:2px solid #555;
}

button{
    margin:10px;
    padding:10px 20px;
    font-size:16px;
}

textarea{
    width:90%;
    height:120px;
    margin:5px;
}
</style>
</head>
<body>

<h1>WebRTC Voice Chat</h1>

<button id="start">Start Microphone</button>
<button id="call">Create Offer</button>
<button id="answer">Create Answer</button>

<div class="container">
<div>
<h2>Local Voice</h2>
<canvas id="localCanvas" width="250" height="120"></canvas>
</div>

<div>
<h2>Remote Voice</h2>
<canvas id="remoteCanvas" width="250" height="120"></canvas>
</div>
</div>

<h3>Local SDP</h3>
<textarea id="localSDP"></textarea>

<h3>Remote SDP</h3>
<textarea id="remoteSDP"></textarea>

<audio id="remoteAudio" autoplay></audio>

<script>
let pc;
let localStream;
console.log("here");

const config={
    iceServers:[
        {urls:"stun:stun.l.google.com:19302"}
    ]
};

async function start(){
    console.log("starting mic");
    localStream=await navigator.mediaDevices.getUserMedia({
        audio:true,
        video:false
    });

    visualize(localStream,document.getElementById("localCanvas"));

    pc=new RTCPeerConnection(config);

    localStream.getTracks().forEach(track=>{
        pc.addTrack(track,localStream);
    });

    pc.ontrack=e=>{
        const stream=e.streams[0];
        remoteAudio.srcObject=stream;
        visualize(stream,document.getElementById("remoteCanvas"));
    };

    pc.onicecandidate=e=>{
        if(!e.candidate){
            localSDP.value=JSON.stringify(pc.localDescription);
        }
    };
}

document.getElementById("start").onclick=start;

call.onclick=async()=>{

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

};

answer.onclick=async()=>{

    const remote=JSON.parse(remoteSDP.value);

    await pc.setRemoteDescription(remote);

    if(remote.type==="offer"){

        const answer=await pc.createAnswer();
        await pc.setLocalDescription(answer);

    }
};

remoteSDP.addEventListener("change",async()=>{

    if(!remoteSDP.value) return;

    const desc=JSON.parse(remoteSDP.value);

    if(!pc.currentRemoteDescription){

        await pc.setRemoteDescription(desc);

    }

});

function visualize(stream,canvas){

    const ctx=canvas.getContext("2d");

    const audioCtx=new AudioContext();

    const analyser=audioCtx.createAnalyser();

    analyser.fftSize=256;

    const source=audioCtx.createMediaStreamSource(stream);

    source.connect(analyser);

    const data=new Uint8Array(analyser.frequencyBinCount);

    function draw(){

        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(data);

        ctx.fillStyle="#111";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        const barWidth=canvas.width/data.length/2;

        for(let i=data.length;i>=0;i--){
            const h=data[i]/255*canvas.height;

            ctx.fillStyle="lime";

            ctx.fillRect(
                (data.length - i)*barWidth,
                canvas.height/2-h/2,
                barWidth-1,
                h
            );
        }

        for(let i=0;i<data.length;i++){
            const h=data[i]/255*canvas.height;

            ctx.fillStyle="lime";

            ctx.fillRect(
                (data.length+i)*barWidth,
                canvas.height/2-h/2,
                barWidth-1,
                h
            );
        }

    }

    draw();

}
</script>

</body>
</html>
