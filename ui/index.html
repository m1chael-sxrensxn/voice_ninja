<html lang="en">

<head>

    <title>voice.ninja</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 30px;
        }

        canvas {
            background: #111;
            border: 2px solid #555;
        }

    </style>

    <div class="container">

        </div>

        <div>
            <h2>Remote Voice</h2>
            <canvas id="remoteCanvas" width="250" height="120"></canvas>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script type="module" src="src/index.js"></script>
